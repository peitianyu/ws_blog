<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wasm Browser Demo (Emscripten-style standalone)</title>
  <style>body{font-family:Segoe UI,Helvetica,Arial;margin:24px}</style>
</head>
<body>
  <h2>Wasm 浏览器示例（C -> wasm）</h2>
  <p>演示：从页面加载 <code>module.wasm</code> 并调用导出的 <code>add</code> 与 <code>fib</code> 函数。</p>

  <div>
    <label>a: <input id="a" type="number" value="5"/></label>
    <label>b: <input id="b" type="number" value="7"/></label>
    <button id="sum">调用 add()</button>
    <div>结果：<span id="sum-out">（未执行）</span></div>
  </div>

  <div style="margin-top:12px">
    <label>fib(n): <input id="n" type="number" value="10"/></label>
    <button id="fib">调用 fib()</button>
    <div>结果：<span id="fib-out">（未执行）</span></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
